<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HN App - Đăng ký</title>
    <style>
        body { background-color: #e3f2fd; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 40px; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 350px; border: 2px solid #bbdefb; }
        .logo-cat { font-size: 40px; text-align: center; display: block; }
        h2 { color: #1e88e5; text-align: center; margin-bottom: 20px; }
        label { font-size: 14px; color: #666; margin-left: 5px; font-weight: 500; }
        input { width: 100%; padding: 12px; margin: 8px 0 15px; border: 1px solid #d1d8e0; border-radius: 12px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 14px; background: #42a5f5; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .link { text-align: center; margin-top: 20px; font-size: 13px; color: #7f8c8d; }
        .link a { color: #1e88e5; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <span class="logo-cat">🐈‍</span>
        <h2>Tạo Tài Khoản</h2>
        <form action="#">
            <label>Họ và Tên</label>
            <input type="text" placeholder="Nhập tên của bạn" required>
            <label>Email</label>
            <input type="email" placeholder="vidu@email.com" required>
            <label>Mật khẩu</label>
            <input type="password" placeholder="Tối thiểu 8 ký tự" required>
            <button type="submit" class="btn">Đăng Ký</button>
        </form>
        <div class="link">Đã có tài khoản? <a href="index.html">Đăng nhập</a></div>
    </div>
</body>
</html>
